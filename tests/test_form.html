<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Application Form</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; background: #f5f5f5; }
    h2 { color: #333; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 6px; color: #555; }
    input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
    textarea { height: 150px; resize: vertical; }
    button[type="submit"] { background: #4CAF50; color: white; padding: 12px 30px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; width: 100%; }
    button[type="submit"]:hover { background: #45a049; }
    .success { display: none; background: #d4edda; color: #155724; padding: 20px; border-radius: 4px; margin-top: 20px; text-align: center; font-size: 18px; }
  </style>
</head>
<body>
  <h2>🧪 Playwright Test Form — Fake ATS</h2>
  <p style="color:#888">This form simulates a real job application. No data is submitted anywhere.</p>

  <form id="application-form">
    <div class="form-group">
      <label for="first_name">First Name</label>
      <input type="text" id="first_name" name="first_name" placeholder="First name">
    </div>

    <div class="form-group">
      <label for="last_name">Last Name</label>
      <input type="text" id="last_name" name="last_name" placeholder="Last name">
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="your@email.com">
    </div>

    <div class="form-group">
      <label for="phone">Phone</label>
      <input type="text" id="phone" name="phone" placeholder="555-555-5555">
    </div>

    <div class="form-group">
      <label for="school">University / School</label>
      <input type="text" id="school" name="school" placeholder="University name">
    </div>

    <div class="form-group">
      <label for="resume">Resume (PDF)</label>
      <input type="file" id="resume" name="resume" accept=".pdf">
    </div>

    <div class="form-group">
      <label for="cover_letter">Cover Letter</label>
      <textarea id="cover_letter" name="cover_letter" placeholder="Paste your cover letter here..."></textarea>
    </div>

    <div class="form-group">
      <label for="why_us">Why do you want to work here?</label>
      <textarea id="why_us" name="why_us" placeholder="Tell us why you're interested..."></textarea>
    </div>

    <div class="form-group">
      <label for="graduation_year">Expected Graduation Year</label>
      <select id="graduation_year" name="graduation_year">
        <option value="">-- Select --</option>
        <option value="2025">2025</option>
        <option value="2026">2026</option>
        <option value="2027">2027</option>
        <option value="2028">2028</option>
      </select>
    </div>

    <button type="submit">Submit Application</button>
  </form>

  <div class="success" id="success-msg">
    ✅ Application received! Thank you for applying.
  </div>

  <script>
    document.getElementById('application-form').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('application-form').style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
    });
  </script>
</body>
</html>
